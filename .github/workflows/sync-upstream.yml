name: Sync fork avec upstream

on:
  schedule:
    - cron: '0 6 * * *'   # tous les jours à 06:00 UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Synchroniser master depuis pi-hole/pi-hole
        run: gh repo sync TheWorms/pi-hole --branch master
        env:
          GH_TOKEN: ${{ secrets.SYNC_TOKEN }}
